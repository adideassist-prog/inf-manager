<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플루언서 공구 매니저 v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#00B493;      /* 민트그린 포인트 */
  --primary-light:#E6F7F4;
  --primary-dark:#00927A;
  --bg:#F5F6F8;           /* 배경 - 아주 연한 회색 */
  --surface:#FFFFFF;      /* 카드 배경 순백 */
  --surface2:#F9FAFB;     /* 서브 카드 */
  --border:#EAECF0;       /* 테두리 */
  --text1:#111827;        /* 주 텍스트 */
  --text2:#4B5563;        /* 보조 텍스트 */
  --text3:#9CA3AF;        /* 힌트 텍스트 */
  --red:#EF4444;
  --orange:#F97316;
  --blue:#3B82F6;
  --yellow:#EAB308;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.1);
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:20px;
}
body{font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{text-decoration:none}

/* ── SHELL ── */
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{display:none;width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:300;overflow-y:auto}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:16px;font-weight:800;color:var(--text1);display:flex;align-items:center;gap:8px}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.sb-kpis{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.sb-kpi-group-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:0 2px;margin-bottom:6px}
.sb-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sb-kpi{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:all .15s;border:1px solid var(--border)}
.sb-kpi:hover{background:var(--primary-light);border-color:var(--primary)}
.sb-kpi-num{font-size:22px;font-weight:800;color:var(--text1);line-height:1}
.sb-kpi-lbl{font-size:10px;color:var(--text3);font-weight:600}
.sb-kpi-big{background:linear-gradient(135deg,#FEF2F2,#FFF5F5);border-radius:var(--radius-sm);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:1px solid #FECACA}
.sb-kpi-big .sb-kpi-lbl{font-size:12px;color:var(--red);font-weight:700}
.sb-kpi-big .sb-kpi-num{font-size:28px;font-weight:900;color:var(--red)}
.sb-nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-size:13px;font-weight:600;text-align:left;width:100%;transition:all .15s}
.sb-link:hover{background:var(--primary-light);color:var(--primary-dark)}
.sb-link.on{background:var(--primary-light);color:var(--primary);font-weight:700}
.sb-link-ico{font-size:18px;width:22px;text-align:center;display:inline-flex;align-items:center;justify-content:center}
.sb-foot{padding:12px 10px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;margin-top:auto}
.sb-action{padding:11px 14px;border-radius:var(--radius-sm);border:2px solid var(--primary);background:var(--primary);color:white;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;text-align:center}
.sb-action:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.sb-action.secondary{background:none;border-color:var(--border);color:var(--text2)}
.sb-action.secondary:hover{background:var(--surface2)}
.sb-hr{height:1px;background:var(--border);margin:2px 0}
.sb-hint{font-size:10px;color:var(--text3);text-align:center;padding-top:4px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── MOBILE HEADER ── */
.mob-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;flex-direction:column;gap:10px}
.mob-row{display:flex;justify-content:space-between;align-items:center}
.mob-title{font-size:17px;font-weight:800;color:var(--text1)}
.mob-acts{display:flex;gap:6px}
.mob-act{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:6px 10px;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer}
.mob-today{background:linear-gradient(135deg,#FEF2F2,#FFF5F5);border:1px solid #FECACA;border-radius:var(--radius-md);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.mob-today-lbl{font-size:12px;font-weight:700;color:var(--red)}
.mob-today-n{font-size:28px;font-weight:900;color:var(--red);line-height:1}
.mob-kpi-row2{display:flex;gap:8px}
.mob-kpi-group{flex:1;display:flex;flex-direction:column;gap:5px}
.mob-kpi-group-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.mob-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mob-kpi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.mob-kpi b{font-size:18px;font-weight:900;color:var(--text1);line-height:1.1}
.mob-kpi span{font-size:9px;font-weight:600;color:var(--text3);white-space:nowrap}

/* ── PC TOPBAR ── */
.pc-topbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:200;flex-direction:column;gap:10px}
.pc-topbar-row1{display:flex;align-items:center;justify-content:space-between}
.pc-topbar-row2{display:flex;gap:10px;align-items:stretch}
.pc-tb-title{font-size:20px;font-weight:800;color:var(--text1)}
.pc-tb-date{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.pc-tb-right{display:flex;align-items:center;gap:8px}
.pc-today-box{background:linear-gradient(135deg,#FEF2F2,white);border:1.5px solid #FECACA;border-radius:var(--radius-sm);padding:8px 18px;cursor:pointer;display:flex;align-items:center;gap:12px}
.pc-today-lbl{font-size:11px;font-weight:700;color:var(--red)}
.pc-today-n{font-size:24px;font-weight:900;color:var(--red);line-height:1}
.pc-kpi-group{flex:1;display:flex;flex-direction:column;gap:5px}
.pc-kpi-group-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.pc-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pc-kpi{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.pc-kpi:hover{border-color:var(--primary);background:var(--primary-light)}
.pc-kpi-n{font-size:18px;font-weight:900;color:var(--text1);line-height:1.1}
.pc-kpi-lbl{font-size:10px;font-weight:600;color:var(--text3);white-space:nowrap}
.pc-btns{display:flex;gap:6px}
.pc-btn{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.pc-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pc-btn.primary{background:var(--primary);border-color:var(--primary);color:white}
.pc-btn.primary:hover{background:var(--primary-dark)}

.page{padding:14px 16px 96px;flex:1;overflow-y:auto}

/* ── BOTTOM NAV ── */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:150}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 0}
.bot-ico{font-size:22px;display:block}
.bot-lbl{font-size:10px;font-weight:700;color:var(--text3)}
.bot-btn.on .bot-lbl{color:var(--primary);font-weight:800}
.bot-btn.on .bot-ico{filter:none}
.fab{position:fixed;bottom:76px;right:16px;background:var(--primary);color:white;border:none;border-radius:16px;width:54px;height:54px;font-size:24px;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;z-index:99;transition:transform .15s}
.fab:hover{transform:scale(1.05)}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text1);color:white;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.3}}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:sdp 1.5s infinite}

/* ── DASHBOARD NAV ── */
.dash-nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:6px;overflow-x:auto}
.dash-nav::-webkit-scrollbar{display:none}
.dash-nav-btn{flex-shrink:0;padding:7px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.dash-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.dash-nav-btn.active{background:var(--primary);border-color:var(--primary);color:white}
.dash-nav-cnt{background:rgba(255,255,255,.3);border-radius:50px;padding:1px 6px;font-size:10px;font-weight:900;margin-left:3px}
.dash-nav-btn:not(.active) .dash-nav-cnt{background:var(--surface2);color:var(--primary)}
.dash-body{display:flex;flex-direction:column;gap:12px;padding:12px 0}

/* ── SECTION ── */
.ds{background:var(--surface);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.ds-hdr{display:flex;align-items:center;gap:12px;padding:15px 16px 13px}
.ds-hdr-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ds-hdr-info{flex:1}
.ds-hdr-title{font-size:15px;font-weight:800;color:var(--text1)}
.ds-hdr-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.ds-add-btn{padding:7px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s}
.ds-add-btn:hover{border-color:var(--primary);color:var(--primary)}
.ds-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}
.empty-s{text-align:center;padding:32px 20px;color:var(--text3)}
.empty-s-ico{font-size:36px;margin-bottom:8px}
.empty-s-txt{font-size:13px;font-weight:600}

/* ── URGENT CARD ── */
.uc{border-radius:var(--radius-sm);padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.uc:hover{box-shadow:var(--shadow-md)}
.uc.today{border-color:#FECACA;background:#FFFBFB}
.uc-urg{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:6px;animation:sdp 1s infinite}
.uc-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.uc-body{flex:1;min-width:0}
.uc-name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;color:var(--text1)}
.uc-product{font-size:11px;font-weight:500;color:var(--text3)}
.uc-action{font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px}
.today-pill{background:#FEE2E2;color:var(--red);font-size:10px;font-weight:800;padding:3px 8px;border-radius:50px}

/* ── GONGGU CARD ── */
.gc{border-radius:var(--radius-sm);padding:13px 14px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.gc:hover{box-shadow:var(--shadow-md)}
.gc.live{border-color:#A7F3D0;background:linear-gradient(135deg,#F0FDF9,white)}
.gc-color-stripe{height:3px;border-radius:50px;margin-bottom:10px}
.gc-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.gc-name{font-size:15px;font-weight:800;color:var(--text1)}
.gc-status{font-size:10px;font-weight:800;padding:3px 9px;border-radius:50px}
.gc-status.live{background:#D1FAE5;color:#065F46}
.gc-status.soon{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.gc-product{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px}
.gc-prog{height:5px;background:var(--border);border-radius:50px;overflow:hidden;margin-bottom:6px}
.gc-prog-fill{height:100%;border-radius:50px;background:var(--primary)}
.gc-dates{display:flex;justify-content:space-between;align-items:center}
.gc-date-txt{font-size:11px;color:var(--text3);font-weight:500}
.gc-d{font-size:12px;font-weight:700;color:var(--primary)}

/* ── SETTLEMENT CARD ── */
.stc{border-radius:var(--radius-sm);padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.stc:hover{box-shadow:var(--shadow-md)}
.stc.urgent-settle{border-color:#93C5FD;background:linear-gradient(135deg,#EFF6FF,white)}
.stc-left{display:flex;align-items:center;gap:10px}
.stc-ico{font-size:22px}
.stc-name{font-size:14px;font-weight:800;margin-bottom:2px;color:var(--text1)}
.stc-product{font-size:12px;color:var(--text3);font-weight:500}
.stc-amount{font-size:13px;font-weight:800;color:var(--primary);margin-top:2px}
.stc-right{text-align:right;flex-shrink:0}
.stc-date{font-size:13px;font-weight:800;color:var(--blue)}
.stc-d{font-size:11px;font-weight:700;margin-top:2px}
.settle-summary{background:var(--primary-light);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;border:1px solid #A7F3D0}

/* ── BRAND CONTACT CARD ── */
.bc{border-radius:var(--radius-sm);padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.bc:hover{box-shadow:var(--shadow-md)}
.bc-ico{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.bc-body{flex:1;min-width:0}
.bc-name{font-size:14px;font-weight:800;margin-bottom:3px;color:var(--text1)}
.bc-product{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:4px}
.bc-action{font-size:12px;font-weight:700;color:var(--primary)}
.bc-days{font-size:11px;color:var(--text3);font-weight:600;margin-left:auto;flex-shrink:0;background:var(--surface2);padding:3px 8px;border-radius:50px;border:1px solid var(--border)}

/* ── PERSONAL TASK ── */
.ptc{border-radius:var(--radius-sm);padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.ptc:hover{box-shadow:var(--shadow-md)}
.ptc.is-today{border-color:var(--primary);background:var(--primary-light)}
.ptc-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ptc-body{flex:1;min-width:0}
.ptc-date{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.ptc-title{font-size:14px;font-weight:800;color:var(--text1);margin-bottom:2px}
.ptc-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;flex-shrink:0;color:var(--text2);background:var(--surface2);border:1px solid var(--border)}

/* ── CHECKLIST ── */
.sc-checks{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.sc-ck{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text2)}
.sc-ck-box{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.sc-ck-box.done{background:var(--primary);border-color:var(--primary);color:white}
.sc-ck.is-done .sc-ck-lbl{text-decoration:line-through;color:var(--text3)}
.sc-ck-arrow{font-size:10px;color:var(--primary);font-weight:800;margin-left:auto;background:var(--primary-light);padding:2px 7px;border-radius:50px}

/* ── BRAND LIST ── */
.search-box{width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;font-family:inherit;background:var(--surface);outline:none;color:var(--text1);transition:border-color .15s}
.search-box:focus{border-color:var(--primary)}
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.on{background:var(--primary);border-color:var(--primary);color:white}
.inf-grid-wrap{display:block}
.inf-card{background:var(--surface);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);transition:all .15s}
.inf-card:hover{box-shadow:var(--shadow-md)}
.inf-card.p1{border-left:4px solid #6366F1}
.inf-card.p2{border-left:4px solid var(--orange)}
.inf-card.p3{border-left:4px solid var(--primary)}
.inf-card.p4{border-left:4px solid var(--blue)}
.inf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.inf-name{font-size:15px;font-weight:800;color:var(--text1)}
.inf-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ph-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:50px}
.prog-bar{height:4px;background:var(--border);border-radius:50px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;border-radius:50px}
.nxt-box{display:flex;align-items:center;gap:6px;border-radius:9px;padding:8px 10px}
.nxt-txt{font-size:12px;font-weight:700}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;padding:8px 16px 40px}
.m-hnd{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 14px}
.m-head{font-size:17px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;color:var(--text1)}
.m-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
.m-x{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:14px;font-weight:700}
.ph-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.ph-tab{padding:10px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.ph-tab:hover{border-color:var(--primary)}
.ph-tab.on{border-color:var(--pc,var(--primary));background:var(--pb,var(--primary-light))}
.ph-tab-ico{font-size:18px;margin-bottom:3px}
.ph-tab-lbl{font-size:10px;font-weight:800;color:var(--text3);display:block}
.ph-tab.on .ph-tab-lbl{color:var(--pc,var(--primary))}

.cl-wrap{background:var(--primary-light);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1.5px solid #A7F3D0}
.cl-title{font-size:10px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.cl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;margin-bottom:3px;transition:background .1s}
.cl-item:hover{background:rgba(0,180,147,.08)}
.cl-item.nxt-item{background:rgba(0,180,147,.12)}
.cl-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.cl-lbl{font-size:13px;font-weight:600;color:var(--text1)}
.cl-item.ckd .cl-lbl{text-decoration:line-through;color:var(--text3)}
.nxt-tag{font-size:9px;font-weight:800;background:var(--primary);color:white;padding:2px 6px;border-radius:50px;margin-left:auto}
.fsec{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;border:1.5px solid var(--border)}
.fsec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fsec-num{width:24px;height:24px;border-radius:8px;background:var(--primary);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fsec-lbl{font-size:13px;font-weight:800;color:var(--text1)}
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text1);background:var(--surface);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-c{flex:1;padding:13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-s{flex:2;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--primary);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.btn-s:hover{background:var(--primary-dark)}
.btn-d{padding:13px 14px;border-radius:var(--radius-sm);border:none;background:#FEF2F2;color:var(--red);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.bm-item{padding:12px 14px;border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:6px;cursor:pointer;border:1.5px solid var(--border);border-left:4px solid var(--primary);transition:all .15s}

/* ── CALENDAR ── */

.cal-cell:nth-child(7n) .day-num{color:var(--blue)}
.ev-layer{position:absolute;top:32px;left:0;right:0;pointer-events:none}

  body{background:var(--bg)}

<script>
/* ═══════════════════════════════
   CONSTANTS
═══════════════════════════════ */
const PHASES=[
  {id:1,key:'review',  label:'제안검토', ico:'📨',color:'#6366F1',bg:'#EEF2FF',
   checks:[{k:'received',lbl:'제안 수령'},     {k:'reviewed',lbl:'제안 내용 검토'},
           {k:'sample_req',lbl:'샘플 요청'},    {k:'accepted',lbl:'공구 수락'}]},
  {id:2,key:'prepare', label:'준비중',   ico:'📦',color:'#D97706',bg:'#FFFBEB',
   checks:[{k:'sample_rcv',lbl:'샘플 수령'},   {k:'content_ready',lbl:'콘텐츠 제작'},
           {k:'link_rcv',lbl:'결제링크 수령'},  {k:'upload_ready',lbl:'업로드 준비 완료'}]},
  {id:3,key:'active',  label:'공구진행', ico:'🛍️',color:'#059669',bg:'#ECFDF5',
   checks:[{k:'started',lbl:'공구 시작'},       {k:'uploaded',lbl:'콘텐츠 업로드 완료'},
           {k:'closed',lbl:'공구 종료'}]},
  {id:4,key:'settle',  label:'정산',     ico:'💰',color:'#2563EB',bg:'#EFF6FF',
   checks:[{k:'requested',lbl:'정산 요청'},     {k:'received',lbl:'정산 완료'}]},
];
const PM=Object.fromEntries(PHASES.map(p=>[p.id,p]));
const DAYS_=['일','월','화','수','목','금','토'];
const PTASK_CATS=['미팅','브랜드연락','콘텐츠제작','촬영','개인약속','개인메모','기타'];
const PTASK_COLORS={'미팅':'#BFDBFE','브랜드연락':'#FDE68A','콘텐츠제작':'#A7F3D0','촬영':'#E9D5FF','개인약속':'#FBCFE8','개인메모':'#FEF08A','기타':'#E2E8F0'};
const PTASK_ICOS={'미팅':'🤝','브랜드연락':'📞','콘텐츠제작':'✏️','촬영':'📸','개인약속':'🗓️','개인메모':'📌','기타':'🔖'};

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
const uid    = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today  = ()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const addDays= (n,b)=>{const d=new Date((b||today())+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const fmtDate= s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`};
const fmtFull= s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS_[d.getDay()]}`;};
const diffDays=s=>{if(!s)return null;const d=new Date(s+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)};

function calcSettleDate(brand){
  return brand.settle_date||(brand.scheduleEndDate?addDays(30,brand.scheduleEndDate):'');
}
const getCL=brand=>{
  const cl=brand.checklist||{};
  return{
    review:  {received:false,reviewed:false,sample_req:false,accepted:false,...(cl.review||{})},
    prepare: {sample_rcv:false,content_ready:false,link_rcv:false,upload_ready:false,...(cl.prepare||{})},
    active:  {started:false,uploaded:false,closed:false,...(cl.active||{})},
    settle:  {requested:false,received:false,...(cl.settle||{})},
  };
};
const getTotalProg=brand=>{const cl=getCL(brand);let done=0,total=0;PHASES.forEach(p=>{p.checks.forEach(c=>{total++;if(cl[p.key][c.k])done++;});});return{done,total}};
function getNextAct(brand){
  const ph=PM[brand.phase||1];const cl=getCL(brand);const phCl=cl[ph.key];
  for(const c of ph.checks){
    if(!phCl[c.k])return{action:c.lbl};
  }
  if(PM[brand.phase+1])return{action:`${PM[brand.phase+1].label} 단계로 이동`};
  return null;
}

/* ═══════════════════════════════
   IndexedDB
═══════════════════════════════ */
const DB_NAME='inf_mgr_v1',DB_VER=1,BS='brands',TS='tasks';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(BS))d.createObjectStore(BS,{keyPath:'id'});if(!d.objectStoreNames.contains(TS))d.createObjectStore(TS,{keyPath:'id'});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e.target.error);});}
const dbAll  =(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut  =(s,item)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).put(item);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbDel  =(s,id)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});

/* ═══════════════════════════════
   BACKUP
═══════════════════════════════ */
async function exportData(){
  const brands=await dbAll(BS);const tasks=await dbAll(TS);
  const blob=new Blob([JSON.stringify({version:1,exportDate:new Date().toISOString(),brands,tasks},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();a.href=url;a.download=`인플루언서매니저_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;a.click();URL.revokeObjectURL(url);
  showToast(`✅ 백업 완료 (${brands.length}개 브랜드)`);
}
async function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const json=JSON.parse(e.target.result);
      const brands=json.brands||[];const tasks=json.tasks||[];
      if(!confirm(`브랜드 ${brands.length}개 + 업무 ${tasks.length}건 불러올까요?`))return;
      for(const b of brands)await dbPut(BS,b);
      for(const t of tasks)await dbPut(TS,t);
      data=await dbAll(BS);pTasks=await dbAll(TS);render();showToast('✅ 불러오기 완료!');
    }catch{alert('파일 형식이 올바르지 않아요.');}
    event.target.value='';
  };reader.readAsText(file);
}

/* ═══════════════════════════════
   GOOGLE DRIVE
═══════════════════════════════ */
const GD_FILE='인플루언서매니저_데이터.json',GD_SCOPE='https://www.googleapis.com/auth/drive.file';
let gdClientId=localStorage.getItem('igm_client_id')||'';
let gdFileId=localStorage.getItem('igm_file_id')||'';
let isGD=false,isSyncing=false,tokenClient=null,gapiReady=false,gisReady=false;
let _syncQueue=Promise.resolve();

function onGapiLoad(){gapi.load('client',async()=>{await gapi.client.init({});await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');gapiReady=true;maybeAutoConnect();});}
function onGisLoad(){gisReady=true;maybeAutoConnect();}
function maybeAutoConnect(){if(!gapiReady||!gisReady||!gdClientId)return;setupTokenClient();tokenClient.requestAccessToken({prompt:''});}
function setupTokenClient(){if(!window.google?.accounts?.oauth2)return;tokenClient=google.accounts.oauth2.initTokenClient({client_id:gdClientId,scope:GD_SCOPE,callback:handleGDToken,error_callback:()=>{isGD=false;updateGDUI();}});}
async function handleGDToken(resp){if(resp.error){isGD=false;updateGDUI();return;}isGD=true;gapi.client.setToken({access_token:resp.access_token});updateGDUI();await gdLoad();render();showToast('☁️ 구글드라이브 연동 완료!');}
function gdConnect(){if(isGD){gdDisconnect();return;}if(!gdClientId){showGDModal();return;}if(!gapiReady||!gisReady){showToast('⏳ API 로딩 중...');return;}setupTokenClient();tokenClient.requestAccessToken({prompt:'consent'});}
async function gdDisconnect(){if(!confirm('연동 해제할까요?'))return;const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});gapi.client.setToken(null);isGD=false;updateGDUI();render();}
async function gdLoad(){if(!isGD)return;_syncQueue=_syncQueue.then(()=>_gdLoadCore()).catch(()=>{});return _syncQueue;}
async function _gdLoadCore(){
  if(!isGD||isSyncing)return;isSyncing=true;updateGDUI();
  try{
    const r=await gapi.client.drive.files.list({q:`name='${GD_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive',pageSize:1});
    const f=r.result.files;if(f&&f.length){gdFileId=f[0].id;localStorage.setItem('igm_file_id',gdFileId);}
    if(gdFileId){
      const r2=await gapi.client.drive.files.get({fileId:gdFileId,alt:'media'});
      const json=JSON.parse(r2.body);
      const dBrands=json.brands||[];const dTasks=json.tasks||[];
      await dbClear(BS);for(const b of dBrands)await dbPut(BS,b);
      await dbClear(TS);for(const t of dTasks)await dbPut(TS,t);
      data=dBrands;pTasks=dTasks;
      localStorage.setItem('igm_last_sync',new Date().toISOString());
    }else await gdSaveNow();
  }catch(e){showToast('⚠️ 드라이브 동기화 실패 (로컬 사용)');}
  isSyncing=false;updateGDUI();
}
let _gdTimer=null;
function gdSave(){if(!isGD)return;clearTimeout(_gdTimer);_gdTimer=setTimeout(gdSaveNow,1500);}
async function gdSaveNow(){if(!isGD)return;_syncQueue=_syncQueue.then(()=>_gdSaveCore()).catch(()=>{});return _syncQueue;}
async function _gdSaveCore(){
  if(!isGD||isSyncing)return;isSyncing=true;updateGDUI();
  try{
    const sr=await gapi.client.drive.files.list({q:`name='${GD_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive',pageSize:1});
    const sf=sr.result.files;if(sf&&sf.length){gdFileId=sf[0].id;localStorage.setItem('igm_file_id',gdFileId);}
    const payload=JSON.stringify({version:1,brands:data,tasks:pTasks});
    const b='igm_bound';
    const body=[`--${b}`,'Content-Type: application/json; charset=UTF-8','',JSON.stringify({name:GD_FILE,mimeType:'application/json'}),`--${b}`,'Content-Type: application/json','',payload,`--${b}--`].join('\r\n');
    if(gdFileId){await gapi.client.request({path:`/upload/drive/v3/files/${gdFileId}`,method:'PATCH',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});}
    else{const r=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});gdFileId=r.result.id;localStorage.setItem('igm_file_id',gdFileId);}
    localStorage.setItem('igm_last_sync',new Date().toISOString());
  }catch(e){showToast('⚠️ 드라이브 저장 실패');}
  isSyncing=false;updateGDUI();
}

function buildUrgent(){
  const t=today();const items=[];

  // ① 공구 시작 D-5 이내 알림
  data.forEach(brand=>{
    if(!brand.scheduleDate)return;
    const dv=diffDays(brand.scheduleDate);
    if(dv===null||dv<0||dv>5)return;
    const cl=getCL(brand);
    if(cl.active.started)return;
    const dvTxt=dv===0?'오늘 시작!':dv===1?'내일 시작':`D-${dv}`;
    items.push({type:'warn',id:brand.id,name:brand.brandName,product:brand.product||'',
      dv, issue:`🛍️ 공구 ${dvTxt} — ${fmtDate(brand.scheduleDate)}`,
      suggest:'결제링크 수령 및 콘텐츠 업로드 준비를 확인하세요'});
  });

  // ② 체험 일정 D-5 이내 알림
  data.forEach(brand=>{
    if(!brand.experienceDate)return;
    const dv=diffDays(brand.experienceDate);
    if(dv===null||dv<0||dv>5)return;
    const dvTxt=dv===0?'오늘!':dv===1?'내일':`D-${dv}`;
    items.push({type:'warn',id:brand.id,name:brand.brandName,product:brand.product||'',
      dv, issue:`🏨 체험 일정 ${dvTxt} — ${fmtDate(brand.experienceDate)}`,
      suggest:'체험 일정을 확인하고 콘텐츠 준비를 시작하세요'});
  });

  // ③ 콘텐츠 업로드 D-5 이내 알림
  data.forEach(brand=>{
    if(!brand.uploadDate)return;
    const dv=diffDays(brand.uploadDate);
    if(dv===null||dv<0||dv>5)return;
    const cl=getCL(brand);
    if(cl.active.uploaded)return;
    const dvTxt=dv===0?'오늘!':dv===1?'내일':`D-${dv}`;
    items.push({type:'warn',id:brand.id,name:brand.brandName,product:brand.product||'',
      dv, issue:`📸 콘텐츠 업로드 ${dvTxt} — ${fmtDate(brand.uploadDate)}`,
      suggest:'콘텐츠를 준비하고 업로드하세요'});
  });

  // ④ 공구 종료됐는데 업로드 미완료
  data.forEach(brand=>{
    if(!brand.scheduleEndDate)return;
    const dv=diffDays(brand.scheduleEndDate);
    if(dv===null||dv>=0)return; // 종료일 지난 것만
    const cl=getCL(brand);
    if(cl.active.uploaded||cl.active.closed)return;
    items.push({type:'warn',id:brand.id,name:brand.brandName,product:brand.product||'',
      dv:-1, issue:`🏁 공구 종료 ${Math.abs(dv)}일 경과 — 업로드 미완료`,
      suggest:'콘텐츠 업로드 후 공구 종료 체크를 해주세요'});
  });

  // ⑤ 정산 D-5 이내 + 지난 것 알림
  data.forEach(brand=>{
    const sd=calcSettleDate(brand);if(!sd)return;
    const dv=diffDays(sd);if(dv===null||dv>5)return;
    const cl=getCL(brand);if(cl.settle.received)return;
    const dvTxt=dv<0?`${Math.abs(dv)}일 경과`:dv===0?'오늘 마감':`D-${dv}`;
    items.push({type:'settle',id:brand.id,name:brand.brandName,product:brand.product||'',
      settleDate:sd,dv,dvTxt,issue:`💰 정산 ${dvTxt}`,isToday:dv===0});
  });

  // ⑥ 오늘 개인 업무 + 긴급 우선순위
  pTasks.filter(p=>!p.done&&(p.date===t||p.priority==='HIGH')).forEach(p=>{
    items.push({type:'personal',id:p.id,title:p.title,category:p.category,
      priority:p.priority,date:p.date,notes:p.notes,isToday:p.date===t});
  });

  return items.sort((a,b)=>{
    const da=a.dv??99,db=b.dv??99;
    if(a.isToday&&!b.isToday)return -1;
    if(!a.isToday&&b.isToday)return 1;
    return da-db;
  });
}

function buildGonggu(){
  const t=today();
  return data.filter(b=>b.scheduleDate&&b.scheduleEndDate&&b.scheduleEndDate>=t&&!getCL(b).active.closed)
    .sort((a,b)=>a.scheduleDate.localeCompare(b.scheduleDate));
}

function buildContent(){
  // 준비중 단계 + 업로드 미완료
  return data.filter(b=>{
    const cl=getCL(b);
    return b.phase===2&&(!cl.prepare.content_ready||!cl.prepare.upload_ready);
  });
}

function buildSettlement(){
  const t=today();const e7=addDays(7);
  return data.filter(b=>{
    const sd=calcSettleDate(b);const cl=getCL(b);
    if(!sd||cl.settle.received)return false;
    return sd<t||sd<=e7;
  }).sort((a,b)=>(calcSettleDate(a)||'').localeCompare(calcSettleDate(b)||''));
}

function buildBrandContact(){
  // 제안검토 단계 브랜드 소통 현황
  return data.filter(b=>b.phase===1)
    .map(b=>{
      const ref=new Date(b.updatedAt||b.createdAt||Date.now());
      const daysSince=Math.floor((new Date()-ref)/86400000);
      const show=daysSince<7||(daysSince>=14&&daysSince<=16)||(daysSince>=21&&daysSince<=23);
      const remindLabel=daysSince>=21?'remind21':daysSince>=14?'remind14':'';
      return{...b,daysSince,show,remindLabel};
    });
}

function buildPersonal(){
  const t=today();const e=addDays(30);
  return pTasks.filter(p=>!p.done&&p.priority!=='HIGH'&&p.date&&p.date<=e&&(p.endDate||p.date)>=t)
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function buildCounts(){
  return{
    urgent:   buildUrgent().length,
    gonggu:   buildGonggu().length,
    content:  buildContent().length,
    settle:   buildSettlement().length,
    brand:    buildBrandContact().filter(b=>b.show).length,
    personal: buildPersonal().length,
  };
}

        ${item.notes?`<div style="font-size:11px;color:#94A3B8;margin-top:2px">"${item.notes.slice(0,50)}"</div>`:''}</div></div>`;
    }
    if(item.type==='settle'){
      return`<div class="uc today" onclick="openEdit('${item.id}')" style="border-color:#BFDBFE;background:linear-gradient(135deg,#EFF6FF,#F8FBFF)">
        <div class="uc-urg" style="background:#2563EB"></div>
        <div class="uc-ico" style="background:#DBEAFE">💰</div>
        <div class="uc-body"><div class="uc-name"><span>${item.name}</span><span class="uc-product">${item.product}</span><span class="today-pill" style="background:#DBEAFE;color:#1D4ED8">${item.dvTxt}</span></div>
        <div class="uc-action" style="color:#1D4ED8">→ 정산 수령 확인 필요 · ${fmtDate(item.settleDate)}</div></div></div>`;
    }
    const brand=data.find(b=>b.id===item.id);
    const ph=brand?PM[brand.phase||1]:null;
    const _cl=brand&&ph?getCL(brand)[ph.key]:null;
    const _cks=ph&&_cl?ph.checks.map(c=>({lbl:c.lbl,done:!!_cl[c.k]})):[];
    const _next=_cks.find(c=>!c.done);
    const _ckHTML=_cks.length?`<div class="sc-checks">${_cks.map(c=>`<div class="sc-ck${c.done?' is-done':''}"><div class="sc-ck-box${c.done?' done':''}">${c.done?'✓':''}</div><span class="sc-ck-lbl">${c.lbl}</span>${!c.done&&c===_next?'<span class="sc-ck-arrow">← 지금</span>':''}</div>`).join('')}</div>`:'';
    return`<div class="uc today" onclick="openEdit('${item.id}')">
      <div class="uc-urg"></div>
      <div class="uc-ico" style="background:#ECFDF5">⚠️</div>
      <div class="uc-body">
        <div class="uc-name"><span>${item.name}</span><span class="uc-product">${item.product}</span><span class="today-pill">긴급</span></div>
        <div class="uc-action">${item.issue}</div>
        <div style="font-size:11px;color:#64748B;margin-top:2px">💡 ${item.suggest}</div>
        ${_ckHTML}
      </div></div>`;
  }).join(''):`<div class="empty-s"><div class="empty-s-ico">✅</div><div class="empty-s-txt">긴급 처리 사항 없음!</div></div>`;

  // S2: 공구 일정
  const t=today();
  const gongguItems=buildGonggu();
  const s2=gongguItems.length?gongguItems.map(b=>{
    const d=diffDays(b.scheduleDate),de=diffDays(b.scheduleEndDate);
    const isLive=d<=0&&de>=0;const pct=isLive?Math.round(((-d)/((-d)+de+1))*100):0;
    const statusLbl=isLive?'진행중 🔥':d===0?'오늘 시작':d>0?`D-${d}`:'';
    return`<div class="gc${isLive?' live':''}" onclick="openEdit('${b.id}')">
      <div class="gc-color-stripe" style="background:#34D399"></div>
      <div class="gc-row1"><div class="gc-name">${b.brandName}${b.managerName?` <span style="color:#059669;font-size:12px">(${b.managerName})</span>`:''}</div>
        <span class="gc-status ${isLive?'live':'soon'}">${statusLbl||'예정'}</span></div>
      <div class="gc-product">${b.product||''}</div>
      ${isLive?`<div class="gc-prog"><div class="gc-prog-fill" style="width:${pct}%;background:#059669"></div></div>`:''}
      <div class="gc-dates"><span class="gc-date-txt">📅 ${fmtDate(b.scheduleDate)} ~ ${fmtDate(b.scheduleEndDate)}</span>
        ${isLive?`<span class="gc-d" style="color:#059669">진행 ${Math.abs(d)+1}일차</span>`:''}</div>
    </div>`;
  }).join(''):`<div class="empty-s"><div class="empty-s-ico">📅</div><div class="empty-s-txt">진행 중인 공구 없음</div></div>`;

  // S3: 콘텐츠 준비
  const contentItems=buildContent();


  // S4: 정산
  const settleItems=buildSettlement();
  const s4=settleItems.length?settleItems.map(b=>{
    const sd=calcSettleDate(b);const dv=sd?diffDays(sd):null;
    const isUrgent=dv!==null&&(dv<=7||dv<0);
    const dvTxt=dv===null?'':dv===0?'오늘':dv<0?`${Math.abs(dv)}일 경과`:`D-${dv}`;
    const cl=getCL(b);
    const schecks=PM[4].checks.map(c=>({lbl:c.lbl,done:cl.settle[c.k]}));
    const snext=schecks.find(c=>!c.done);
    const sckHTML=schecks.length?`<div class="sc-checks" style="margin-top:5px">${schecks.map(c=>`<div class="sc-ck${c.done?' is-done':''}"><div class="sc-ck-box${c.done?' done':''}">${c.done?'✓':''}</div><span class="sc-ck-lbl">${c.lbl}</span>${!c.done&&c===snext?'<span class="sc-ck-arrow">← 지금</span>':''}</div>`).join('')}</div>`:'';
    return`<div class="stc${isUrgent?' urgent-settle':''}" onclick="openEdit('${b.id}')">
      <div class="stc-left"><div class="stc-ico">💰</div>
        <div><div class="stc-name">${b.brandName}</div>
          <div class="stc-product">${b.product||''}</div>
          ${b.commission?`<div style="font-size:11px;color:#059669;font-weight:700">수수료 ${b.commission}%</div>`:''}
          ${sckHTML}
        </div></div>
      <div class="stc-right">
        <div class="stc-date">${fmtDate(sd)}</div>
        <div class="stc-d" style="color:${dv<0||dv===0?'#EF4444':isUrgent?'#D97706':'#94A3B8'}">${dvTxt}</div>
        ${b.expectedAmount?`<div class="stc-amount">${Number(b.expectedAmount).toLocaleString()}원</div>`:''}
      </div></div>`;
  }).join(''):`<div class="empty-s"><div class="empty-s-ico">💰</div><div class="empty-s-txt">7일 이내 정산 예정 없음</div></div>`;

  // S5: 브랜드 소통
  const brandItems=buildBrandContact();
  const s5=brandItems.filter(b=>b.show).length?brandItems.filter(b=>b.show).map(b=>{
    const cl=getCL(b);const phChecks=PM[1].checks.map(c=>({lbl:c.lbl,done:cl.review[c.k]}));
    const next=phChecks.find(c=>!c.done);
    const ckHTML=`<div class="sc-checks" style="margin-top:5px">${phChecks.map(c=>`<div class="sc-ck${c.done?' is-done':''}"><div class="sc-ck-box${c.done?' done':''}">${c.done?'✓':''}</div><span class="sc-ck-lbl">${c.lbl}</span>${!c.done&&c===next?'<span class="sc-ck-arrow">← 지금</span>':''}</div>`).join('')}</div>`;
    return`<div class="bc${b.remindLabel?' '+b.remindLabel:''}" onclick="openEdit('${b.id}')">
      <div class="bc-ico">🏢</div>
      <div class="bc-body">
        <div class="bc-name">${b.brandName}${b.managerName?` <span style="color:#5B21B6;font-weight:800">(${b.managerName})</span>`:''}</div>
        ${b.contactChannel?`<div style="font-size:11px;color:#6366F1;font-weight:600;margin-bottom:2px">${b.contactChannel}</div>`:''}
        <div class="bc-product">${b.product||''}</div>
        ${b.chatHistory?`<div style="font-size:11px;color:#64748B;margin:3px 0;padding:4px 8px;background:#F8FAFC;border-radius:6px">"${b.chatHistory.slice(0,60)}${b.chatHistory.length>60?'...':''}"</div>`:''}
        ${ckHTML}
      </div>
      <span class="bc-days">${b.daysSince}일</span>
    </div>`;
  }).join(''):`<div class="empty-s"><div class="empty-s-ico">🏢</div><div class="empty-s-txt">소통 중인 브랜드 없음</div></div>`;

  // S6: 개인 업무
  const personalItems=buildPersonal();
  const s6=personalItems.length?personalItems.map(p=>{
    const c=PTASK_COLORS[p.category]||'#94A3B8';const ico=PTASK_ICOS[p.category]||'📋';
    const isToday=p.date===t;const dv=diffDays(p.date);
    const dvTxt=dv===0?'오늘':dv===1?'내일':dv>0?`D-${dv}`:'';
    return`<div class="ptc${isToday?' is-today':''}" onclick="openTaskEdit('${p.id}')">
      <div class="ptc-ico" style="background:${c}35">${ico}</div>
      <div class="ptc-body">
        <div class="ptc-date">${isToday?'오늘':fmtFull(p.date)}${p.time?' · '+p.time:''}</div>
        <div class="ptc-title">${p.title}</div>
        ${p.notes?`<div style="font-size:11px;color:#94A3B8;margin-top:2px">"${p.notes.slice(0,50)}"</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="ptc-badge" style="background:${c}35;border:1px solid ${c}">${p.category}</span>
        ${dvTxt?`<span style="font-size:12px;font-weight:800;color:${dv===0?'#DC2626':dv<=3?'#D97706':'#94A3B8'}">${dvTxt}</span>`:''}
      </div></div>`;
  }).join(''):`<div class="empty-s"><div class="empty-s-ico">📝</div><div class="empty-s-txt">30일 내 개인 일정 없음</div></div>`;

  return navHTML+`<div class="dash-body">
    <div class="ds" id="sec-urg"><div class="ds-hdr h-urg"><div class="ds-hdr-ico"><i class="ti ti-alert-triangle" aria-hidden="true"></i></div>
      <div class="ds-hdr-info"><div class="ds-hdr-title" style="color:#DC2626">긴급 &amp; 오늘 할 일</div><div class="ds-hdr-sub" style="color:#DC2626">${counts.urgent}건 처리 필요</div></div>
      <button class="ds-add-btn" style="border-color:#FECACA;color:#DC2626" onclick="openTaskAdd()">+ 업무 추가</button></div>
      <div class="ds-body">${s1}</div></div>
    <div class="ds" id="sec-gonggu"><div class="ds-hdr h-gonggu"><div class="ds-hdr-ico"><i class="ti ti-calendar-event" aria-hidden="true"></i></div>
      <div class="ds-hdr-info"><div class="ds-hdr-title" style="color:#059669">공구 일정</div><div class="ds-hdr-sub" style="color:#059669">진행 중 + 예정 · ${counts.gonggu}건</div></div>
      <button class="ds-add-btn" style="border-color:#A7F3D0;color:#059669" onclick="openAdd()">+ 추가</button></div>
      <div class="ds-body">${s2}</div></div>

    <div class="ds" id="sec-settle"><div class="ds-hdr h-settle"><div class="ds-hdr-ico"><i class="ti ti-currency-won" aria-hidden="true"></i></div>
      <div class="ds-hdr-info"><div class="ds-hdr-title" style="color:#1D4ED8">정산 관리</div><div class="ds-hdr-sub" style="color:#1D4ED8">7일 이내 정산 예정 · ${counts.settle}건</div></div></div>
      <div class="ds-body">${s4}</div></div>
    <div class="ds" id="sec-brand"><div class="ds-hdr h-brand"><div class="ds-hdr-ico"><i class="ti ti-building-store" aria-hidden="true"></i></div>
      <div class="ds-hdr-info"><div class="ds-hdr-title" style="color:#5B21B6">브랜드 소통</div><div class="ds-hdr-sub" style="color:#5B21B6">제안 검토 중 · ${counts.brand}개 (7일 이상 무응답 자동 숨김)</div></div></div>
      <div class="ds-body">${s5}</div></div>
    <div class="ds" id="sec-personal"><div class="ds-hdr h-personal"><div class="ds-hdr-ico"><i class="ti ti-notebook" aria-hidden="true"></i></div>
      <div class="ds-hdr-info"><div class="ds-hdr-title" style="color:#0369A1">업무 일정</div><div class="ds-hdr-sub" style="color:#0369A1">30일 내 미완료 · ${counts.personal}건</div></div>
      <button class="ds-add-btn" style="border-color:#BAE6FD;color:#0369A1" onclick="openTaskAdd()">+ 추가</button></div>
      <div class="ds-body">${s6}</div></div>
  </div>`;
}

        <div><div class="inf-name">${starBadge}${b.brandName||'브랜드명 없음'}</div>
          <div class="inf-sub">${b.vendorName||''}${b.managerName?' · '+b.managerName:''}${b.managerPhone?' · '+b.managerPhone:''}</div></div>
        <span class="ph-badge" style="background:${ph.bg};color:${ph.color}">${ph.ico} ${ph.label}</span>
      </div>
      ${b.product?`<div style="font-size:12px;font-weight:700;color:#059669;margin-bottom:6px">${b.product}</div>`:''}
      ${b.commission?`<div style="font-size:11px;font-weight:700;color:#64748B;margin-bottom:6px">수수료 ${b.commission}%${b.expectedAmount?' · 예상 '+Number(b.expectedAmount).toLocaleString()+'원':''}</div>`:''}

      <div class="prog-bar"><div class="prog-fill" style="width:${prog.total?Math.round(prog.done/prog.total*100):0}%;background:${ph.color}"></div></div>
      <div style="display:flex;flex-direction:column;gap:2px;margin-bottom:5px">${phChecks.slice(0,3).map(c=>`<div class="sc-ck${c.done?' is-done':''}"><div class="sc-ck-box${c.done?' done':''}">${c.done?'✓':''}</div><span class="sc-ck-lbl">${c.lbl}</span></div>`).join('')}</div>
      ${na?`<div class="nxt-box" style="background:#ECFDF5"><span class="nxt-txt" style="color:#059669">→ ${na.action}</span></div>`:''}
      ${b.scheduleDate?`<div style="font-size:11px;color:#2563EB;font-weight:700;margin-top:4px">📅 ${fmtDate(b.scheduleDate)}~${fmtDate(b.scheduleEndDate)}</div>`:''}
      ${sd&&!getCL(b).settle.received&&b.phase===4?`<div style="font-size:11px;color:#059669;font-weight:700;margin-top:2px">💰 정산: ${fmtDate(sd)}</div>`:''}
    </div>`;
  }).join('')}</div>`:`<div class="empty-s"><div class="empty-s-ico">🏢</div><div class="empty-s-txt">공구가 없어요</div></div>`;
  return`<div id="brand-list">${chips}${cards}</div>`;

/* ─── CALENDAR ─── */
function rCal(){
  const DAYS_CAL=['일','월','화','수','목','금','토'];
  const MONTHS_CAL=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const t=today();
  // 공구 기간 바
  const spans=[];
  data.forEach(b=>{
    if(!b.scheduleDate)return;
    const end=b.scheduleEndDate||b.scheduleDate;
    const col='#34D399';
    spans.push({id:b.id,label:b.brandName+(b.product?' · '+b.product:''),start:b.scheduleDate,end,color:col});
  });
  // 업무 콘텐츠 업로드
  data.forEach(b=>{
    if(b.experienceDate)
      spans.push({id:b.id,label:'🏨 체험 · '+b.brandName,start:b.experienceDate,end:b.experienceDate,color:'#FBCFE8',isPt:true});
    if(!b.uploadDate)return;
    if(!getCL(b).active.uploaded)
      spans.push({id:b.id,label:'📸 업로드 · '+b.brandName,start:b.uploadDate,end:b.uploadDate,color:'#FDE68A',isPt:true});
  });
  // 정산일
  data.forEach(b=>{
    const sd=calcSettleDate(b);if(!sd)return;
    if(!getCL(b).settle.received)
      spans.push({id:b.id,label:'💰 정산 · '+b.brandName,start:sd,end:sd,color:'#BFDBFE',isPt:true});
  });
  // 개인 업무
  pTasks.filter(p=>!p.done&&p.date).forEach(p=>{
    const c=PTASK_COLORS[p.category]||'#E2E8F0';
    spans.push({id:p.id,label:(PTASK_ICOS[p.category]||'📝')+' '+p.title,start:p.date,end:p.endDate||p.date,color:c,isTask:true});
  });

  const first=new Date(calY,calM,1);const lastDate=new Date(calY,calM+1,0).getDate();const dow=first.getDay();
  const pm=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:pm-i,dim:true,date:null});
  for(let d=1;d<=lastDate;d++){const m=(calM+1).toString().padStart(2,'0');const dd=d.toString().padStart(2,'0');cells.push({d,dim:false,date:`${calY}-${m}-${dd}`});}
  while(cells.length%7)cells.push({d:cells.length-dow-lastDate+1,dim:true,date:null});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  const BAR_H=22;const cw=100/7;
  const weeksHTML=weeks.map(wk=>{
    const wkD=wk.map(c=>c.date).filter(Boolean);const ws=wkD[0],we=wkD[wkD.length-1];
    if(!ws)return`<div class="cal-week">${wk.map(c=>cellH(c,t)).join('')}</div>`;
    const activeSpans=spans.filter(sp=>sp.start<=we&&sp.end>=ws);const rows=[];
    activeSpans.forEach(sp=>{
      const sc=sp.start<ws?0:wk.findIndex(c=>c.date===sp.start);
      const ec=sp.end>we?6:wk.findLastIndex(c=>c.date===sp.end);
      const s=Math.max(0,sc),e=ec<0?6:ec;
      for(let r=0;r<6;r++){if(!rows[r])rows[r]=[];if(!rows[r].some(x=>!(x.e<s||x.s>e))){rows[r].push({sp,s,e});break;}}
    });
    const maxR=rows.length;const mh=Math.max(90,32+maxR*BAR_H+4);
    let bars='';
    rows.forEach((row,ri)=>{row.forEach(({sp,s,e})=>{
      const left=(s*cw).toFixed(2)+'%';const width=((e-s+1)*cw-.3).toFixed(2)+'%';const top=(ri*BAR_H+2)+'px';
      const isS=sp.start>=ws,isE=sp.end<=we;
      const r2=isS&&isE?'5px':isS?'5px 2px 2px 5px':isE?'2px 5px 5px 2px':'2px';
      const fn=sp.isTask?`openTaskEdit('${sp.id}')`:`openEdit('${sp.id}')`;
      bars+=`<div class="ev-bar" onclick="${fn}" style="left:${left};width:${width};top:${top};background:${sp.color};border-radius:${r2}"><span class="ev-bar-lbl">${sp.label}</span></div>`;
    });});
    return`<div class="cal-week" style="min-height:${mh}px">${wk.map(c=>cellH(c,t)).join('')}<div class="ev-layer">${bars}</div></div>`;
  }).join('');

  // 선택 날짜 패널
  const selEvs=selDate?spans.filter(sp=>sp.start<=selDate&&selDate<=sp.end):[];
  const selD=selDate?new Date(selDate+'T00:00:00'):null;
  const selLbl=selD?`${selD.getMonth()+1}월 ${selD.getDate()}일 ${DAYS_CAL[selD.getDay()]}요일`:'';
  const ddContent=selEvs.length
    ?`<div class="dd-hdr">📌 ${selLbl} · ${selEvs.length}건</div>${selEvs.map(e=>{
      const fn=e.isTask?`openTaskEdit('${e.id}')`:`openEdit('${e.id}')`;
      const dv=e.start?diffDays(e.start):null;const dvTxt=dv===0?'오늘':dv>0?`D-${dv}`:'';
      return`<div style="padding:8px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer;background:#F8FAFC;display:flex;align-items:center;gap:8px" onclick="${fn}">
        <div style="width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
        <div style="flex:1"><div style="font-size:13px;font-weight:800">${e.label}</div></div>
        ${dvTxt?`<span style="font-size:11px;font-weight:800;color:${dv===0?'#DC2626':'#059669'}">${dvTxt}</span>`:''}
      </div>`;}).join('')}`
    :(selDate?`<div class="dd-hdr">🗓️ ${selLbl}</div><div style="font-size:12px;color:#94A3B8;padding:8px 0">일정 없음</div>`:'');
  const ddPanel=ddContent?`<div class="day-detail-panel">${ddContent}</div>`:'';

  const calCore=`

let taskFilter='all',taskSort='date',taskSearch='';
function rTasks(){
  const t=today();
  let tasks=pTasks.filter(p=>{
    if(taskFilter==='done')return p.done;
    if(taskFilter==='HIGH')return !p.done&&p.priority==='HIGH';
    const catMatch=PTASK_CATS.includes(taskFilter)?p.category===taskFilter:true;
    return !p.done&&catMatch;
  });
  tasks.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  const chips=`<div class="chip-row" style="flex-wrap:wrap;gap:5px 4px">
    <button class="chip${taskFilter==='all'?' on':''}" onclick="taskFilter='all';rContent()">전체</button>
    <button class="chip${taskFilter==='HIGH'?' on':''}" onclick="taskFilter='HIGH';rContent()">🔴 긴급</button>
    ${PTASK_CATS.map(c=>`<button class="chip${taskFilter===c?' on':''}" onclick="taskFilter='${c}';rContent()">${c}</button>`).join('')}
    <button class="chip${taskFilter==='done'?' on':''}" onclick="taskFilter='done';rContent()">✅ 완료</button>
  </div>`;
  function taskCard(p){
    const c=PTASK_COLORS[p.category]||'#94A3B8';const ico=PTASK_ICOS[p.category]||'📋';
    const dv=p.date?diffDays(p.date):null;const dvTxt=dv===0?'오늘':dv===1?'내일':dv>0?`D-${dv}`:'';
    const priLbl={HIGH:'🔴',MID:'🟡',LOW:'🟢'}[p.priority||'MID'];
    return`<div class="ptc${p.date===t?' is-today':''}" onclick="openTaskEdit('${p.id}')" style="opacity:${p.done?.6:1}">
      <div class="ptc-ico" style="background:${c}35">${ico}</div>
      <div class="ptc-body">
        <div class="ptc-date">${p.date?fmtFull(p.date):'날짜 없음'}${p.time?' · '+p.time:''}</div>
        <div class="ptc-title" style="${p.done?'text-decoration:line-through;color:#94A3B8':''}">${priLbl} ${p.title}</div>
        ${p.notes?`<div style="font-size:11px;color:#94A3B8;margin-top:2px">"${p.notes.slice(0,50)}"</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="ptc-badge" style="background:${c}35;border:1px solid ${c}">${p.category}</span>
        ${dvTxt&&!p.done?`<span style="font-size:12px;font-weight:800;color:${dv===0?'#DC2626':dv<=3?'#D97706':'#94A3B8'}">${dvTxt}</span>`:''}
      </div></div>`;
  }
  const doneTasks=pTasks.filter(p=>p.done).slice(0,10);
  const emptyMsg=!tasks.length?`<div class="empty-s"><div class="empty-s-ico">📝</div><div class="empty-s-txt">업무 일정이 없어요</div></div>`:'';
  const doneHTML=doneTasks.length?`<details style="margin-top:8px"><summary style="font-size:13px;font-weight:800;color:#94A3B8;cursor:pointer;padding:8px 0">✅ 완료된 업무 ${pTasks.filter(p=>p.done).length}건</summary><div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">${doneTasks.map(taskCard).join('')}</div></details>`:'';
  return`<div class="dash-body"><div style="background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06)">${chips}</div>
    <div style="background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06)">
      <div style="display:flex;flex-direction:column;gap:6px">${tasks.map(taskCard).join('')}</div>${emptyMsg}${doneHTML}
    </div></div>`;
}

function onSeChange(val){const el=document.getElementById('f-settle');if(el&&val)el.value=addDays(30,val);}
function onExpChange(val){
  // 체험일 +3일 → 콘텐츠 업로드 예정일 자동 설정
  const up=document.getElementById('f-upload');
  if(up&&val&&!up.value)up.value=addDays(3,val);
}
function calcSettle(){
  const rev=parseFloat(document.getElementById('f-revenue')?.value||0);
  const comm=parseFloat(document.getElementById('f-commission')?.value||0);
  const disp=document.getElementById('f-amount-display');
  const inp=document.getElementById('f-amount');
  if(rev&&comm){
    const amt=Math.round(rev*comm/100);
    if(disp)disp.textContent=amt.toLocaleString()+'원';
    if(inp)inp.value=amt;
  } else {
    if(disp)disp.textContent='매출과 수수료율 입력 시 자동계산';
    if(inp)inp.value='';
  }
}
function switchPh(ph){const f=collectBrand();editBrand={...(editBrand||{}),id:editBrand?.id||uid(),...f,phase:ph};modalPh=ph;closeId('brand-modal');showBrandModal();}

async function toggleCk(phId,key,brandId){
  let brand=data.find(b=>b.id===brandId)||(editBrand?.id===brandId?editBrand:null);
  const isNew=!data.find(b=>b.id===brandId);
  if(!brand&&isNew)brand={id:brandId,phase:1,checklist:{review:{},prepare:{},active:{},settle:{}},createdAt:new Date().toISOString()};
  if(!brand)return;
  const ph=PM[phId];const cl=getCL(brand);const newVal=!cl[ph.key][key];
  cl[ph.key][key]=newVal;
  const updated={...brand,checklist:cl,updatedAt:new Date().toISOString()};
  editBrand={...(editBrand||{}),...updated};_modalCL=cl;
  if(!isNew){await dbPut(BS,updated);data=await dbAll(BS);gdSave();}
  // DOM 업데이트
  const lbl=document.querySelector(`[onclick*="toggleCk(${phId},'${key}'"]`);
  if(lbl){lbl.classList.toggle('ckd',newVal);const cb=lbl.querySelector('input');if(cb){cb.checked=newVal;}}
  PHASES.forEach(p=>{const tab=document.querySelector(`.ph-tab:nth-child(${p.id})`);if(!tab)return;const pcl=getCL(updated)[p.key];const done=p.checks.filter(c=>pcl[c.k]).length;const ck=tab.querySelector('.ph-tab-ck');if(ck)ck.textContent=`${done}/${p.checks.length}`;});
}

function collectBrand(){
  const gv=id=>{const e=document.getElementById(id);return e?e.value:''};
  return{brandName:gv('f-brand'),managerName:gv('f-manager'),contactChannel:gv('f-channel'),
    vendorName:gv('f-vendor'),product:gv('f-product'),commission:gv('f-commission'),revenue:gv('f-revenue'),expectedAmount:gv('f-amount'),managerPhone:gv('f-phone'),
    chatHistory:gv('f-chat'),scheduleDate:gv('f-ss'),scheduleEndDate:gv('f-se'),
    experienceDate:gv('f-exp'),uploadDate:gv('f-upload'),settle_date:gv('f-settle'),notes:gv('f-notes'),
    priority:parseInt(gv('f-priority'))||0};
}

async function saveBrandModal(id){
  const form=collectBrand();const existing=data.find(b=>b.id===id);
  const final={...(existing||{}), ...form, id, phase:modalPh||editBrand?.phase||1,
    checklist:_modalCL, createdAt:existing?.createdAt||editBrand?.createdAt||new Date().toISOString(),
    updatedAt:new Date().toISOString()};

function setPriority(n){
  const inp=document.getElementById('f-priority');const lbl=document.getElementById('star-lbl');

async function resetAllData(){
  if(!confirm('⚠️ 모든 데이터가 삭제돼요!\n정말 초기화할까요?'))return;
  if(!confirm('마지막 확인! 되돌릴 수 없어요. 초기화할까요?'))return;
  await dbClear(BS);await dbClear(TS);
  data=[];pTasks=[];
  render();showToast('🗑️ 전체 초기화됐어요');
}

═══════════════════════════════ */
async function init(){
  await openDB();
  data=await dbAll(BS);
  pTasks=await dbAll(TS);
  render();
}
init();

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&isGD){
    const ls=localStorage.getItem('igm_last_sync');
    const elapsed=ls?(Date.now()-new Date(ls).getTime()):Infinity;
    if(elapsed>60000)gdLoad().then(()=>render());
  }
});
setInterval(()=>{if(!isGD||isSyncing)return;gdLoad().then(()=>render());},60000);
